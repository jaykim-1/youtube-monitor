name: YouTube Monitor Worker

on:
  schedule:
    # 15분 간격 (UTC). 공개 저장소는 Actions 시간 무제한.
    # 실제로는 GitHub 부하에 따라 5~15분 지연될 수 있음.
    - cron: '*/15 * * * *'
  workflow_dispatch:
    # 수동 실행 버튼 활성화
    inputs:
      no_mail:
        description: '메일 전송 건너뛰기'
        required: false
        default: 'false'
      no_summary:
        description: '자동 요약 건너뛰기'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: worker
  cancel-in-progress: false

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run worker
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL: gemini-3.5-flash
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.no_mail }}" = "true" ]; then ARGS="$ARGS --no-mail"; fi
          if [ "${{ github.event.inputs.no_summary }}" = "true" ]; then ARGS="$ARGS --no-summary"; fi
          python worker.py $ARGS

      - name: Commit DB changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -f youtube_monitor.db ]; then
            git add youtube_monitor.db
            if git diff --staged --quiet; then
              echo "No DB changes to commit."
            else
              git commit -m "[bot] worker run $(date -u +%FT%TZ)"
              git push
            fi
          else
            echo "youtube_monitor.db not found."
          fi

      - name: Keep Streamlit app awake (ping)
        # Streamlit Cloud 무료 플랜은 유휴 시 슬립됨. 15분마다 ping해서 깨어있게 유지.
        # STREAMLIT_APP_URL secret이 설정돼 있을 때만 동작. 실패해도 워크플로 전체는 성공 처리.
        if: ${{ env.STREAMLIT_APP_URL != '' }}
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          echo "Pinging Streamlit app to keep it awake..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 -L "$STREAMLIT_APP_URL" || echo "000")
          echo "HTTP status: $HTTP_CODE"
          # 200 (정상), 303 (슬립 깨우는 중) 모두 OK로 간주
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "303" ]; then
            echo "App is reachable."
          else
            echo "Warning: unexpected status $HTTP_CODE (not failing workflow)."
          fi
